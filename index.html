<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEM MODA | Tu Identidad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;900&display=swap" rel="stylesheet">
    <style>
        body { background: #ffffff; color: #111; font-family: 'Urbanist', sans-serif; overflow-x: hidden; }
        .bento-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; padding: 15px; }
        .bento-item { background: #f9f9f9; border-radius: 24px; overflow: hidden; position: relative; transition: 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .bento-item:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .accent-green { color: #6DAE5A; }
    </style>
</head>
<body>

    <section class="flex flex-col items-center justify-center pt-20 pb-10 text-center">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter leading-none mb-4 uppercase">
            Tu <span class="accent-green">Identidad.</span>
        </h1>
        <p class="text-[10px] tracking-[0.5em] font-bold text-gray-400 uppercase">Luxury Streetwear / Quito</p>
    </section>

    <section class="max-w-7xl mx-auto mb-20">
        <div class="bento-grid">
            <div class="bento-item col-span-4 md:col-span-2 row-span-2 h-[600px]">
                <video autoplay muted loop playsinline class="w-full h-full object-cover">
                    <source src="1000813159.mp4" type="video/mp4">
                </video>
                <div class="absolute bottom-8 left-8 text-white">
                    <h2 class="text-4xl font-black italic uppercase">New Drop</h2>
                </div>
            </div>

            <div class="bento-item col-span-2 md:col-span-1 p-8 flex flex-col justify-center border border-gray-100">
                <img src="1000813631.jpg" class="w-16 mb-4" alt="Logo">
                <h3 class="font-black uppercase text-xl mb-2">Nuestro <span class="accent-green">ADN</span></h3>
                <p class="text-xs text-gray-500 leading-relaxed">Determinación de la hormiga. Vida de la hoja.</p>
            </div>

            <div class="bento-item col-span-2 md:col-span-1 bg-gray-100">
                <img src="tu-foto-catalogo.jpg" class="w-full h-full object-cover grayscale hover:grayscale-0 transition duration-700">
            </div>

            <div class="bento-item col-span-4 md:col-span-2 bg-[#111] text-white p-10 flex justify-between items-end">
                <div>
                    <p class="text-[10px] uppercase tracking-widest opacity-50 mb-2">Ubicación</p>
                    <h4 class="text-2xl font-bold">Quito & Ambato</h4>
                </div>
                <a href="https://wa.me/593979010077" class="bg-white text-black px-6 py-3 rounded-full font-black text-xs uppercase">WhatsApp</a>
            </div>
        </div>
    </section>

</body>
</html>
